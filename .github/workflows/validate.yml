name: Validate repository

on:
  push:
    branches:
      - main
      - "feat/**"
      - "fix/**"
      - "release/**"
  pull_request:
    paths:
      - ".codex-plugin/**"
      - ".github/workflows/validate.yml"
      - "assets/**"
      - "docs/**"
      - "skills/**"
      - "validation/**"
      - "AGENTS.md"
      - "CHANGELOG.md"
      - "LICENSE"
      - "README.md"
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve exact source SHA
        id: source
        env:
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_SHA: ${{ github.sha }}
        run: |
          if [ -n "$PR_HEAD_SHA" ]; then
            echo "sha=$PR_HEAD_SHA" >> "$GITHUB_OUTPUT"
          else
            echo "sha=$PUSH_SHA" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout exact source commit
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.source.outputs.sha }}

      - name: Run repository validator
        run: |
          python3 skills/finuslugi-3d-visual-pipeline/scripts/validate_repository.py \
            --report validation/runtime/report.json

      - name: Run runtime contract validator
        run: |
          python3 skills/finuslugi-3d-visual-pipeline/scripts/validate_runtime_contract.py \
            --report validation/runtime/runtime-report.json

      - name: Run asset registry validator
        run: |
          python3 skills/finuslugi-3d-visual-pipeline/scripts/validate_asset_registry.py \
            --report validation/runtime/asset-report.json

      - name: Publish success status
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
          SOURCE_SHA: ${{ steps.source.outputs.sha }}
        run: |
          gh api --method POST \
            "repos/${{ github.repository }}/statuses/$SOURCE_SHA" \
            -f state=success \
            -f context=f3d/validation \
            -f description="Repository, runtime, and asset validators passed"

      - name: Publish failure status
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
          SOURCE_SHA: ${{ steps.source.outputs.sha }}
        run: |
          gh api --method POST \
            "repos/${{ github.repository }}/statuses/$SOURCE_SHA" \
            -f state=failure \
            -f context=f3d/validation \
            -f description="Repository, runtime, or asset validator failed"

      - name: Upload validation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: f3d-validation-${{ steps.source.outputs.sha }}
          path: |
            validation/runtime/report.json
            validation/runtime/runtime-report.json
            validation/runtime/asset-report.json
          if-no-files-found: error
