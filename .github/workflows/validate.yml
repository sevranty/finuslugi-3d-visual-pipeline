name: Validate repository

on:
  push:
    branches: [main, "feat/**", "fix/**", "release/**", "chore/**"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: 3dp-validation-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: read
  pull-requests: read
  statuses: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact source commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Validate diff whitespace
        if: github.event_name == 'pull_request'
        run: git diff --check "${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}"

      - name: Run complete validation
        run: python3 skills/3d-visual-pipeline/scripts/validate_all.py --report-dir validation/runtime

      - name: Validate one active PR per TASK_ID
        if: always() && github.event_name == 'pull_request'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: >-
          python3 skills/3d-visual-pipeline/scripts/validate_pr_governance.py
          --event "$GITHUB_EVENT_PATH"
          --repository "$GITHUB_REPOSITORY"
          --report validation/runtime/pr-governance.json

      - name: Verify clean workspace
        if: always()
        run: |
          changes="$(git status --short)"
          if [ -n "$changes" ]; then
            printf '%s\n' "$changes"
            exit 1
          fi

      - name: Publish success status
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh api --method POST "repos/${{ github.repository }}/statuses/${{ github.event.pull_request.head.sha || github.sha }}" -f state=success -f context=3dp/validation -f description="All repository, release and PR governance validators passed"

      - name: Publish failure status
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh api --method POST "repos/${{ github.repository }}/statuses/${{ github.event.pull_request.head.sha || github.sha }}" -f state=failure -f context=3dp/validation -f description="Repository, release or PR governance validation failed"

      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: 3dp-validation-${{ github.run_id }}
          path: validation/runtime/*.json
          if-no-files-found: error
