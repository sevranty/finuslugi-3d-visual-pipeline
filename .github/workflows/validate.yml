name: Validate repository

on:
  push:
    branches: [main, "feat/**", "fix/**", "release/**", "chore/**"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: 3dp-validation-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  statuses: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact source commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Run complete validation
        run: python3 skills/3d-visual-pipeline/scripts/validate_all.py --report-dir validation/runtime

      - name: Publish success status
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh api --method POST "repos/${{ github.repository }}/statuses/${{ github.event.pull_request.head.sha || github.sha }}" -f state=success -f context=3dp/validation -f description="All repository and release validators passed"

      - name: Publish failure status
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh api --method POST "repos/${{ github.repository }}/statuses/${{ github.event.pull_request.head.sha || github.sha }}" -f state=failure -f context=3dp/validation -f description="Repository or release validation failed"

      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: 3dp-validation-${{ github.run_id }}
          path: validation/runtime/*.json
          if-no-files-found: error
